<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake V4</title>

<style>
body {
     background-image: url(./b5.jpeg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

.bg {
    position:fixed;
    inset:0;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:-2;
    transition:opacity 1s ease;
    will-change: opacity;
}

canvas{
    background:#1111115a;
    box-shadow:0 0 20px rgb(0, 255, 200);
    border-radius:10px;
}

.ui{
    position:absolute;
    top:10px;
}

.screen{
    position:absolute;
    background:rgba(94, 63, 82, 0.168);
    padding:30px;
    border-radius:10px;
    text-align:center;
}

button{
    padding:10px;
    margin:10px;
    cursor:pointer;
    background:rgba(255, 255, 255, 0.193);
    border:none;
    border-radius:10px;
    font-size:22px;
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg" style="opacity:0"></div>

<div class="ui">
Score: <span id="score">0</span> |
Level: <span id="level">1</span> |
Lives: <span id="lives">3</span> |
High: <span id="high">0</span>
</div>

<canvas id="c" width="400" height="400"></canvas>

<div id="menu" class="screen">
<h2>Amany el so3bana🐍</h2>
<button onclick="startGame()">Start Game</button>
</div>

<div id="gameover" class="screen" style="display:none">
<h2>Game Over</h2>
<p id="final"></p>
<button onclick="location.reload()">Restart</button>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

let snake, dx, dy, food, score, level, lives, speed;
let grid=20;
let interval;

let obstacles = [];
let paused = false;

// sounds
const eatSound = new Audio("eat.wav");
const hitSound = new Audio("hit.wav");

// high score
let high = localStorage.getItem("snakeHigh") || 0;

// 🔥 backgrounds (نفس الأسماء بتاعتك)
const backgrounds = [
 "bg1-blur.jpg",
 "b2.jpeg",
 "n2c.jpg",
 "b3.jpeg",
 "n4.jpg",
 "b5.jpeg",
 "n6.jpg",
 "b4.jpeg",
 "10.jpg",
 "b1.jpeg",
];

let currentBg = 1;
let bgIndex = 0;
let bgInterval;

// أول خلفية
function setInitialBackground(){
 document.getElementById('bg1').style.backgroundImage = `url(${backgrounds[0]})`;
 document.getElementById('bg2').style.opacity = 0;
}

// fade
function changeBackground(index){
 let img = new Image();

 img.src = backgrounds[index];

 img.onload = function(){ // الصورة اشتغلت
   let bg1 = document.getElementById('bg1');
   let bg2 = document.getElementById('bg2');

   let next = currentBg === 1 ? bg2 : bg1;
   let current = currentBg === 1 ? bg1 : bg2;

   next.style.backgroundImage = `url(${backgrounds[index]})`;
   next.style.opacity = 1;

   current.style.opacity = 0;

   currentBg = currentBg === 1 ? 2 : 1;
 };

 img.onerror = function(){ // الصورة بايظة → روح للي بعدها
   autoBackgroundSlider();
 };
}

// 🔄 slider تلقائي
function autoBackgroundSlider(){
 bgIndex = (bgIndex + 1) % backgrounds.length;
 changeBackground(bgIndex);
}

function rand(){return Math.floor(Math.random()*20)*grid}

function reset(){
 snake=[{x:200,y:200}];
 dx=grid;dy=0;
 score=0;level=1;lives=3;
 speed=120;
 obstacles=[];
 spawnFood();
}

function spawnFood(){
 let valid=false;
 while(!valid){
   let newFood = {x:rand(), y:rand(), type:Math.random()};
   valid = !snake.some(s=>s.x===newFood.x && s.y===newFood.y) &&
           !obstacles.some(o=>o.x===newFood.x && o.y===newFood.y);
   if(valid) food=newFood;
 }
}

function spawnObstacles(){
 obstacles = [];
 for(let i=0;i<level;i++){
   obstacles.push({x:rand(), y:rand()});
 }
}

function startGame(){
 document.getElementById('menu').style.display='none';
 setInitialBackground();
 reset();

 interval=setInterval(loop,speed);

 // 🔥 تشغيل السلايدر
 bgInterval = setInterval(autoBackgroundSlider, 3000);
}

function loop(){
 if(paused) return;
 move();
 if(checkCollision()) return;
 draw();
}

function move(){
 let head={x:snake[0].x+dx,y:snake[0].y+dy};

 if(head.x>=400)head.x=0;
 if(head.x<0)head.x=380;
 if(head.y>=400)head.y=0;
 if(head.y<0)head.y=380;

 snake.unshift(head);

 if(head.x===food.x && head.y===food.y){
   eat();
 }else{
   snake.pop();
 }
}

function eat(){
 eatSound.play();

 if(food.type<0.7){score+=1}
 else if(food.type<0.9){score+=3}
 else{snake.pop()}

 spawnFood();
 updateLevel();
}

function updateLevel(){
 let newLevel=Math.floor(score/5)+1;

 if(newLevel!==level){
   level=newLevel;

   speed = Math.max(60, 120 - level * 4);

   spawnObstacles();

   clearInterval(interval);
   interval=setInterval(loop,speed);
 }
}

function checkCollision(){
 let head=snake[0];

 for(let i=1;i<snake.length;i++){
   if(head.x===snake[i].x && head.y===snake[i].y){
     loseLife(); return true;
   }
 }

 for(let o of obstacles){
   if(head.x===o.x && head.y===o.y){
     loseLife(); return true;
   }
 }
}

function loseLife(){
 hitSound.play();

 lives--;
 if(lives<=0){

   if(score > high){
     localStorage.setItem("snakeHigh", score);
   }

   document.getElementById('gameover').style.display='block';
   document.getElementById('final').innerText='Score: '+score;

   clearInterval(interval);
 }
}

function draw(){
 ctx.clearRect(0,0,400,400);

 ctx.shadowBlur = 10 + Math.sin(Date.now()/100)*5;

 snake.forEach((s,i)=>{
   ctx.fillStyle=i===0?'#0f0':'#6f6';
   ctx.shadowColor='lime';
   ctx.fillRect(s.x,s.y,20,20);
 });

 ctx.fillStyle = "#888";
 ctx.shadowBlur = 0;
 obstacles.forEach(o=>{
   ctx.fillRect(o.x,o.y,20,20);
 });

 if(food.type<0.7) ctx.fillStyle='red';
 else if(food.type<0.9) ctx.fillStyle='yellow';
 else ctx.fillStyle='purple';

 ctx.shadowBlur=20;
 ctx.fillRect(food.x,food.y,20,20);
 ctx.shadowBlur=0;

 document.getElementById('score').innerText=score;
 document.getElementById('level').innerText=level;
 document.getElementById('lives').innerText=lives;
 document.getElementById('high').innerText =
   localStorage.getItem("snakeHigh") || 0;
}

document.addEventListener('keydown',e=>{
 if(e.key==='ArrowUp' && dy===0){dx=0;dy=-grid}
 if(e.key==='ArrowDown' && dy===0){dx=0;dy=grid}
 if(e.key==='ArrowLeft' && dx===0){dx=-grid;dy=0}
 if(e.key==='ArrowRight' && dx===0){dx=grid;dy=0}

 if(e.key === ' ') paused = !paused;
});
</script>

</body>
</html>
